name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  pruebas:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15.3
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: techsecure2026
          POSTGRES_DB: techcommerce_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v3
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install pytest
          pip install -r requirements.txt
      - name: Correr tests
        env:
          DATABASE_URL: postgresql+psycopg2://postgres:techsecure2026@localhost:5432/techcommerce_db
        run: pytest test_main.py

  deploy:
    needs: pruebas  # ESTO ES LA CLAVE: Solo despliega si las pruebas pasan
    runs-on: ubuntu-latest
    steps:
      - name: Deploy a Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
